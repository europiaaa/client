<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(25px);
            z-index: -1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: white;
        }

        .header {
            animation: fadeIn 1s ease-in;
        }

        .title {
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .description {
            font-size: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.8s ease-out;
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            backdrop-filter: blur(10px);
            pointer-events: none;
        }

        .glow-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.1) 0%, transparent 70%);
        }

        .glow-2 {
            width: 250px;
            height: 250px;
            bottom: 10%;
            right: 10%;
            background: radial-gradient(circle, rgba(52, 152, 219, 0.1) 0%, transparent 70%);
        }
    </style>
</head>
<body>
    <video autoplay muted loop class="video-background">
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="container">
        <div class="header">
            <h1 class="title">Europia</h1>
        </div>

        <div class="description">example</div>
    </div>
</body>
</html>
