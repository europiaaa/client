<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(40px);
            z-index: -1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: white;
        }

        .header {
            animation: fadeIn 1s ease-in;
        }

        .title {
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .example-desc {
            font-size: 18px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.8s ease-out;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .description {
            font-size: 16px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.8s ease-out;
            opacity: 0.9;
            line-height: 1.8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <video autoplay muted loop class="video-background">
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="container">
        <div class="header">
            <h1 class="title">Itis Client</h1>
            <p class="example-desc">A Minecraft 1.8.9 Hack Client</p>
        </div>

        <div class="description">Price: Free<br>40+ Modules<br>Customizable Visuals</div>
    </div>
</body>
</html>
